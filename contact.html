<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - The Daily Grind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>The Daily Grind</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Our Coffee</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h2>Get In Touch</h2>
            <p>We'd love to hear from you!</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-info">
                <h3>Visit Us</h3>
                <p>123 Coffee Bean Lane<br>Aroma City, CA 90210</p>
                <h3>Customer Support</h3>
                <p>Email: support@dailygrind.com<br>Phone: (123) 456-7890</p>
            </div>
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form id="contact-form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="6" required></textarea>

                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 The Daily Grind. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
